# Cloudflare Pages / Workers config for folio-forever-next.
#
# This file is the authoritative binding map. Secrets (Stripe keys, Drive
# service-account JSON, Clerk keys, Resend API key) are set via:
#   wrangler pages secret put <NAME>
# and never committed.
#
# Update `name` and `account_id` once Jayvee provides the Cloudflare account.

name = "folio-forever"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# --- D1 (SQLite) — orders, designs, clients ---
# Commented out until the D1 database is created and the real database_id
# is pasted in. Cloudflare deploy fails on placeholder IDs.
# [[d1_databases]]
# binding = "DB"
# database_name = "folio-forever-db"
# database_id = "REPLACE_WITH_D1_ID_AFTER_CREATE"

# --- KV — design drafts. Namespace created 2026-04-28 in dashboard. ---
# Used by /api/designs (POST writes the design under a random token,
# GET /api/designs/{token} reads it back). 60-day TTL matches the photo
# retention spec. Native binding: env.DESIGN_DRAFTS.put / get.
[[kv_namespaces]]
binding = "DESIGN_DRAFTS"
id = "325e972a22e749e2915d3ac0ce98eb6b"

# --- R2 — primary photo storage. Bucket created 2026-04-28. ---
# Native binding: env.PHOTOS.put(key, body) from edge route handlers.
[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "folioforever-photos"

# --- Public env vars (non-secret; safe in repo) ---
[vars]
SITE_NAME = "Folio & Forever"
SITE_URL = "https://folioforever.com"
DESIGN_RETENTION_DAYS = "60"   # 2-month photo retention per spec
MAX_UPLOAD_BYTES = "31457280"  # 30 MB hard cap; client-side optimizer (album-builder.js) trims most uploads to ~5 MB before sending.
